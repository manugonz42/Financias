name: build

# Compila los instaladores nativos (.msi en Windows, .dmg en macOS) al etiquetar
# una versión y los adjunta a una Release de GitHub. Gratis en repos públicos.
#   git tag v0.1.0 && git push origin v0.1.0
# También se puede lanzar a mano desde la pestaña Actions (workflow_dispatch).

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # necesario para que tauri-action cree la Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon → .dmg arm64
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest # → .msi / .exe
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Firma del updater (añade estos secretos en el repo de GitHub):
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Financias ${{ github.ref_name }}"
          releaseDraft: true
          args: ${{ matrix.args }}
